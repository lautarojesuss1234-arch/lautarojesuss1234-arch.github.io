// ── DASHBOARD ──
function renderDashboard() {
  const total = registros.reduce((s, r) => s + (r.litros || 0), 0);
  document.getElementById('kpiLitros').textContent = total > 0 ? total.toLocaleString('es-AR') : '—';
  document.getElementById('kpiRemitos').textContent = registros.length;

  const bodegas = new Set(registros.map(r => r.bodega_origen).filter(Boolean));
  const choferes = new Set(registros.map(r => r.nombre_chofer).filter(Boolean));
  document.getElementById('kpiBodegas').textContent = bodegas.size;
  document.getElementById('kpiChoferes').textContent = choferes.size;

  // Chart: litros por bodega origen
  const bodegaMap = {};
  registros.forEach(r => {
    if (!r.bodega_origen) return;
    bodegaMap[r.bodega_origen] = (bodegaMap[r.bodega_origen] || 0) + (r.litros || 0);
  });
  renderBarChart('chartBodega', bodegaMap, 6, var_accent());

  // Chart: top choferes
  const choferMap = {};
  registros.forEach(r => {
    if (!r.nombre_chofer) return;
    choferMap[r.nombre_chofer] = (choferMap[r.nombre_chofer] || 0) + (r.litros || 0);
  });
  renderBarChart('chartChofer', choferMap, 6, '#5af0c8');

  // Heatmap last 30 days
  renderHeatmap();
}

function var_accent() { return '#e8ff5a'; }

function renderBarChart(elId, dataMap, maxBars, color) {
  const el = document.getElementById(elId);
  const entries = Object.entries(dataMap).sort((a,b) => b[1]-a[1]).slice(0, maxBars);
  if (!entries.length) { el.innerHTML = '<div style="color:var(--text-muted);font-size:12px;margin:auto;">Sin datos aún</div>'; return; }
  const max = Math.max(...entries.map(e => e[1]));
  el.innerHTML = entries.map(([label, val]) => {
    const pct = max ? Math.round((val / max) * 90) : 0;
    const short = label.length > 10 ? label.slice(0,10) + '…' : label;
    return `<div class="bar-wrap">
      <div class="bar-val">${val.toLocaleString('es-AR')}</div>
      <div class="bar" style="height:${pct}px;background:${color};" title="${label}: ${val}"></div>
      <div class="bar-label">${short}</div>
    </div>`;
  }).join('');
}

function renderHeatmap() {
  const el = document.getElementById('heatmap');
  const days = 30;
  const today = new Date();
  const countByDay = {};
  registros.forEach(r => {
    if (!r._ts) return;
    const d = r._ts.slice(0, 10);
    countByDay[d] = (countByDay[d] || 0) + 1;
  });
  let html = '';
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().slice(0, 10);
    const cnt = countByDay[key] || 0;
    const cls = cnt === 0 ? '' : cnt === 1 ? 'active-1' : cnt <= 3 ? 'active-2' : 'active-3';
    const day = d.getDate();
    html += `<div class="heatmap-day ${cls}" title="${key}: ${cnt} remitos">${day}</div>`;
  }
  el.innerHTML = html;
}

// ── RECORDS ──
function buildFilters() {
  const meses = new Set(), choferes = new Set(), origenes = new Set(), destinos = new Set();
  registros.forEach(r => {
    if (r._ts) meses.add(r._ts.slice(0, 7));
    if (r.nombre_chofer) choferes.add(r.nombre_chofer);
    if (r.bodega_origen)  origenes.add(r.bodega_origen);
    if (r.bodega_destino) destinos.add(r.bodega_destino);
  });

  fillFilter('filterMes', [...meses].sort().reverse(), m => {
    const [y, mo] = m.split('-');
    return new Date(y, mo - 1).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
  });
  fillFilter('filterChofer', [...choferes].sort());
  fillFilter('filterOrigen',  [...origenes].sort());
  fillFilter('filterDestino', [...destinos].sort());
}

function fillFilter(id, values, labelFn) {
  const sel = document.getElementById(id);
  const cur = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  values.forEach(v => {
    const o = document.createElement('option');
    o.value = v;
    o.textContent = labelFn ? labelFn(v) : v;
    sel.appendChild(o);
  });
  // restore previous selection if still valid
  if ([...sel.options].some(o => o.value === cur)) sel.value = cur;
}

function renderRecords() {
  const mes     = document.getElementById('filterMes').value;
  const chofer  = document.getElementById('filterChofer').value;
  const origen  = document.getElementById('filterOrigen').value;
  const destino = document.getElementById('filterDestino').value;

  let filtered = registros.filter(r => {
    if (mes     && !r._ts?.startsWith(mes))       return false;
    if (chofer  && r.nombre_chofer !== chofer)     return false;
    if (origen  && r.bodega_origen  !== origen)    return false;
    if (destino && r.bodega_destino !== destino)   return false;
    return true;
  });

  // ── Tramos summary (show when at least one bodega filter is active)
  const tramosCard = document.getElementById('tramosCard');
  if (origen || destino) {
    renderTramos(filtered);
    tramosCard.style.display = 'block';
  } else {
    tramosCard.style.display = 'none';
  }

  const tbody = document.getElementById('recordsTbody');
  const empty = document.getElementById('emptyState');

  // Totals bar
  let totalsBar = document.getElementById('totalsBar');
  if (!totalsBar) {
    totalsBar = document.createElement('div');
    totalsBar.id = 'totalsBar';
    totalsBar.className = 'totals-bar';
    document.querySelector('.records-table-wrap').after(totalsBar);
  }

  if (!filtered.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    totalsBar.style.display = 'none';
    return;
  }
  empty.style.display = 'none';

  const totalLitros = filtered.reduce((s, r) => s + (r.litros || 0), 0);
  totalsBar.style.display = 'flex';
  totalsBar.innerHTML = `
    <span>Viajes: <strong>${filtered.length}</strong></span>
    <span>Total litros: <strong>${totalLitros.toLocaleString('es-AR')} L</strong></span>
    ${origen  ? `<span>Desde: <strong>${origen}</strong></span>` : ''}
    ${destino ? `<span>Hasta: <strong>${destino}</strong></span>` : ''}
  `;

  tbody.innerHTML = filtered.map((r) => `
    <tr>
      <td style="color:var(--text-muted)">${registros.length - registros.indexOf(r)}</td>
      <td>${r.fecha || '—'}</td>
      <td><span class="badge">${r.numero_remito || '—'}</span></td>
      <td style="color:var(--accent)">${r.litros ? r.litros.toLocaleString('es-AR') + ' L' : '—'}</td>
      <td>${r.bodega_origen || '—'}</td>
      <td>${r.bodega_destino || '—'}</td>
      <td>${r.nombre_chofer || '—'}</td>
    </tr>`).join('');
}

function renderTramos(data) {
  // Group by origen → destino
  const tramoMap = {};
  data.forEach(r => {
    const key = `${r.bodega_origen || '?'}||${r.bodega_destino || '?'}`;
    if (!tramoMap[key]) tramoMap[key] = { origen: r.bodega_origen, destino: r.bodega_destino, viajes: 0, litros: 0 };
    tramoMap[key].viajes++;
    tramoMap[key].litros += (r.litros || 0);
  });

  const entries = Object.values(tramoMap).sort((a, b) => b.litros - a.litros);
  const el = document.getElementById('tramosGrid');

  if (!entries.length) { el.innerHTML = '<p style="color:var(--text-muted);font-size:13px;">Sin resultados para este tramo.</p>'; return; }

  el.innerHTML = `<div class="tramos-grid">${entries.map(t => `
    <div class="tramo-row">
      <span class="tramo-origen">${t.origen || '—'}</span>
      <span class="tramo-arrow">→</span>
      <span class="tramo-destino">${t.destino || '—'}</span>
      <div class="tramo-meta">
        <div class="tramo-stat">
          <span class="tramo-stat-val">${t.viajes}</span>
          <span class="tramo-stat-lbl">viajes</span>
        </div>
        <div class="tramo-stat">
          <span class="tramo-stat-val">${(t.litros/1000).toFixed(1)}k</span>
          <span class="tramo-stat-lbl">litros</span>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

// ── CSV EXPORT ──
function exportCSV() {
  if (!registros.length) { showToast('No hay registros para exportar'); return; }
  const headers = ['numero_remito','fecha','litros','bodega_origen','bodega_destino','nombre_chofer'];
  const rows = [headers.join(',')];
  registros.forEach(r => {
    rows.push(headers.map(h => `"${(r[h] ?? '').toString().replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `remitos_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('✓ CSV descargado');
}

// ── CLEAR ALL ──
function clearAll() {
  if (!confirm('¿Borrar todos los registros? No se puede deshacer.')) return;
  registros = [];
  saveData();
  updateHeader();
  renderRecords();
  showToast('Registros eliminados');
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
